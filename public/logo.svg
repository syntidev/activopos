<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    ActivoPOS Logo — 3D (POSITIVE)
    Uso: landing, app header, materiales de marca
    Azul: #0038BD Persian Blue | Naranja: #EF8E01 Carrot Ámbar
    Punto V: 235,270 | ViewBox centrado 400x400
  -->
  <defs>
    <radialGradient id="gaz" cx="50%" cy="15%" r="75%">
      <stop offset="0%" stop-color="#4D7AFF"/>
      <stop offset="100%" stop-color="#0038BD"/>
    </radialGradient>
    <radialGradient id="gor" cx="85%" cy="85%" r="70%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#EF8E01"/>
    </radialGradient>
    <filter id="sh_az" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#00104A" flood-opacity="0.35"/>
    </filter>
    <filter id="sh_or" x="-80%" y="-80%" width="300%" height="300%">
      <feDropShadow dx="-10" dy="-5" stdDeviation="10" flood-color="#00104A" flood-opacity="0.50"/>
    </filter>
    <clipPath id="naranja_clip">
      <polygon points="235,270 600,-600 600,500 0,500"/>
    </clipPath>
  </defs>

  <g filter="url(#sh_az)">
    <path d="M200,40 L360,340 L40,340 Z"
      fill="url(#gaz)" stroke="url(#gaz)" stroke-width="52"
      stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <g filter="url(#sh_or)">
    <path d="M200,40 L360,340 L40,340 Z"
      fill="url(#gor)" stroke="url(#gor)" stroke-width="52"
      stroke-linejoin="round" stroke-linecap="round"
      clip-path="url(#naranja_clip)"/>
  </g>
</svg>
