<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!--
    ActivoPOS — NEGATIVE (fondo oscuro navy)
    Brackets: #FFFFFF | Círculo: #EF8E01 con glow
  -->
  <defs>
    <filter id="sh-bracket-dk" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FFFFFF" flood-opacity="0.12"/>
    </filter>
    <filter id="glow-circle" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sh-rings-dk" x="-15%" y="-15%" width="135%" height="135%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#EF8E01" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="500" height="500" fill="#0D1B2E"/>

  <g filter="url(#sh-bracket-dk)">
    <path fill="#FFFFFF" d="M 26,82 Q 26,26 82,26 L 190,26 Q 220,26 220,56 Q 220,88 190,88 L 100,88 Q 88,88 88,100 L 88,190 Q 88,220 56,220 Q 26,220 26,190 Z"/>
    <path fill="#FFFFFF" d="M 474,82 Q 474,26 418,26 L 310,26 Q 280,26 280,56 Q 280,88 310,88 L 400,88 Q 412,88 412,100 L 412,190 Q 412,220 444,220 Q 474,220 474,190 Z"/>
    <path fill="#FFFFFF" d="M 26,418 Q 26,474 82,474 L 190,474 Q 220,474 220,444 Q 220,412 190,412 L 100,412 Q 88,412 88,400 L 88,310 Q 88,280 56,280 Q 26,280 26,310 Z"/>
    <path fill="#FFFFFF" d="M 474,418 Q 474,474 418,474 L 310,474 Q 280,474 280,444 Q 280,412 310,412 L 400,412 Q 412,412 412,400 L 412,310 Q 412,280 444,280 Q 474,280 474,310 Z"/>
  </g>

  <g filter="url(#sh-rings-dk)">
    <circle fill="none" stroke="#EF8E01" stroke-width="5" opacity="0.70" cx="250" cy="250" r="96"/>
    <circle fill="none" stroke="#EF8E01" stroke-width="3.5" opacity="0.40" cx="250" cy="250" r="120"/>
    <circle fill="none" stroke="#EF8E01" stroke-width="2" opacity="0.22" cx="250" cy="250" r="144"/>
  </g>

  <circle filter="url(#glow-circle)" fill="#EF8E01" cx="250" cy="250" r="72"/>
</svg>
