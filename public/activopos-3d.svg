<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4D7AFF"/>
      <stop offset="100%" stop-color="#001D7A"/>
    </linearGradient>
    <linearGradient id="ts" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.20"/>
      <stop offset="40%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="kg" cx="35%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#FFE0A0"/>
      <stop offset="35%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#B56700"/>
    </radialGradient>
    <radialGradient id="ks" cx="38%" cy="28%" r="38%">
      <stop offset="0%" stop-color="white" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="ft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#00104A" flood-opacity="0.38"/>
    </filter>
    <filter id="fk" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#001060" flood-opacity="0.50"/>
    </filter>
    <!-- ClipPath del track para confinar el knob -->
    <clipPath id="track_clip">
      <rect x="60" y="120" width="280" height="160" rx="80"/>
    </clipPath>
  </defs>

  <!-- Track -->
  <g filter="url(#ft)">
    <rect x="60" y="120" width="280" height="160" rx="80" fill="url(#tg)"/>
  </g>
  <rect x="60" y="120" width="280" height="160" rx="80" fill="url(#ts)"/>

  <!-- Knob CLIPEADO al track — nunca sale -->
  <g clip-path="url(#track_clip)">
    <g filter="url(#fk)">
      <circle cx="255" cy="200" r="68" fill="url(#kg)"/>
    </g>
    <circle cx="255" cy="200" r="68" fill="url(#ks)"/>
  </g>

</svg>
